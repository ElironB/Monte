name: Publish npm Package

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_ENV: test
      NEO4J_PASSWORD: ci-test-password
      MINIO_ACCESS_KEY: ci-test-access-key
      MINIO_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run web:install
      - run: npm run build
      - run: npm run web:build
      - run: npm test -- --run
      - run: npm run test:benchmarks
      - run: npm run benchmark:pretty
      - run: npm pack

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_ENV: test
      NEO4J_PASSWORD: ci-test-password
      MINIO_ACCESS_KEY: ci-test-access-key
      MINIO_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm ci
      - run: npm run web:install
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_ENV: test
      NEO4J_PASSWORD: ci-test-password
      MINIO_ACCESS_KEY: ci-test-access-key
      MINIO_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          cache: npm

      - run: npm ci
      - run: npm run web:install
      - run: npm pkg set name=@elironb/monte-engine repository.type=git repository.url=https://github.com/ElironB/Monte.git
      - run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
